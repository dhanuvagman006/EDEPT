<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Department Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>Department</h1>
          <p class="muted">Select your department to view registered students.</p>
        </div>

        <nav class="nav" aria-label="Back to main">
          <a href="./index.html" title="Back to Participants and Teams">← Main</a>
        </nav>
      </header>

      <section class="card">
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
          <label class="search" style="flex: 1; min-width: 200px;" aria-label="Select department">
            <span class="searchIcon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" stroke="currentColor" stroke-width="1.5" fill="currentColor" />
              </svg>
            </span>
            <select id="deptSelect" style="width:100%; background:transparent; border:0; outline:none; color:inherit; font-size:14px;">
              <option value="">Select department…</option>
            </select>
          </label>
          <button id="loginBtn" type="button">Get Details</button>
        </div>
        <div style="margin-top: 12px;">
          <span class="muted" id="status"></span>
        </div>
      </section>

      <section>
        <div id="content" class="content" style="margin-top: 24px;"></div>
      </section>

      <footer class="footer muted">
        Data source: <code>response.json</code> filtered by department events. Students show events they registered for.
      </footer>
    </main>

    <script src="./department.js"></script>
  </body>
</html>
